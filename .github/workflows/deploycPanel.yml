name: Deploy portfolio on push
on:
  push:
    branches:
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Use the version you use locally

      - name: 🔨 Build Project
        run: |
          npm install
          npm run build
        # This MUST finish without errors for the next step to work

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # CHANGE THIS BELOW: Use ./dist/ if you are using Vite
          local-dir: ./build/
          server-dir: ./
